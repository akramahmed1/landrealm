# Landrealm — Render Deployment Config
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: landrealm
    runtime: node
    plan: starter  # $7/mo — upgrade to standard ($25/mo) for production
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: VITE_KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_OPEN_URL
        value: https://open.kimi.com
      - key: OWNER_UNION_ID
        sync: false
